<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0b0b10">
<title>DocScan</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0b0b10;--s1:#12121a;--s2:#1a1a26;--s3:#242436;
  --accent:#00dfa2;--accent-lo:rgba(0,223,162,.12);--accent-md:rgba(0,223,162,.3);
  --warn:#ff6b6b;--text:#e2e2ec;--dim:#55556a;--dim2:#33334a;
  --r:10px;--font:'Outfit',sans-serif;--mono:'JetBrains Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);position:relative;touch-action:none}
.hide{display:none!important}
button{font-family:var(--font);cursor:pointer;border:none;outline:none;-webkit-appearance:none}

#toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s2);border:1px solid var(--s3);color:var(--text);
  padding:12px 24px;border-radius:40px;font-size:14px;font-weight:500;
  opacity:0;transition:all .3s;z-index:9999;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#spinner-overlay{
  position:fixed;inset:0;background:rgba(11,11,16,.85);z-index:9998;
  display:none;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
#spinner-overlay.show{display:flex}
.spinner{width:40px;height:40px;border:3px solid var(--s3);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner-text{font-family:var(--mono);font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px}

#screen-welcome{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:28px;padding:40px 28px;text-align:center;
  background:radial-gradient(ellipse at 50% 0%,rgba(0,223,162,.06) 0%,transparent 60%),var(--bg);
}
.w-icon{
  width:100px;height:100px;border-radius:28px;
  background:linear-gradient(135deg,var(--accent-lo),rgba(0,223,162,.04));
  border:1px solid var(--accent-md);
  display:flex;align-items:center;justify-content:center;
  animation:float 4s ease-in-out infinite;
}
.w-icon svg{width:48px;height:48px;stroke:var(--accent);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.w-title{font-size:32px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.w-title em{font-style:normal;color:var(--accent)}
.w-sub{color:var(--dim);font-size:15px;line-height:1.6;max-width:300px}
.btn-main{
  background:var(--accent);color:var(--bg);padding:16px 52px;border-radius:60px;
  font-size:16px;font-weight:600;display:flex;align-items:center;gap:10px;
  transition:transform .15s,filter .15s;
}
.btn-main:active{transform:scale(.96)}
.btn-ghost{
  background:transparent;color:var(--dim);padding:12px 28px;border-radius:60px;
  font-size:14px;font-weight:500;border:1px solid var(--dim2);transition:all .2s;
}
.btn-ghost:active{border-color:var(--accent);color:var(--accent)}

#screen-camera{display:none;flex-direction:column;height:100%;background:#000;position:relative}
#video{width:100%;height:100%;object-fit:cover}
.cam-overlay{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:space-between;pointer-events:none}
.cam-top{padding:16px 20px;display:flex;justify-content:space-between;align-items:center;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent);pointer-events:auto}
.cam-bottom{padding:24px 20px 40px;display:flex;justify-content:center;align-items:center;gap:40px;background:linear-gradient(to top,rgba(0,0,0,.7),transparent);pointer-events:auto}
.cam-btn{
  background:rgba(255,255,255,.1);backdrop-filter:blur(8px);
  width:44px;height:44px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;color:#fff;transition:all .15s;
}
.cam-btn:active{background:rgba(255,255,255,.25)}
.cam-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.shutter{
  width:72px;height:72px;border-radius:50%;
  border:4px solid rgba(255,255,255,.8);background:transparent;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.shutter-inner{width:58px;height:58px;border-radius:50%;background:#fff;transition:all .15s}
.shutter:active .shutter-inner{transform:scale(.85);background:var(--accent)}
.cam-guide{position:absolute;inset:15% 10%;border:2px dashed rgba(255,255,255,.2);border-radius:8px;pointer-events:none}
.cam-label{font-family:var(--mono);font-size:11px;color:rgba(255,255,255,.4);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-transform:uppercase;letter-spacing:2px}

#screen-crop{display:none;flex-direction:column;height:100%;background:var(--bg)}
.crop-header{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;background:var(--s1);border-bottom:1px solid var(--s2);flex-shrink:0}
.crop-title{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px}
.crop-btn{padding:8px 20px;border-radius:40px;font-size:13px;font-weight:600;transition:all .15s}
.crop-btn.back{background:var(--s2);color:var(--text)}
.crop-btn.done{background:var(--accent);color:var(--bg)}
.crop-btn:active{transform:scale(.95)}
.crop-canvas-wrap{
  flex:1;position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  background:repeating-conic-gradient(var(--s1) 0% 25%,var(--bg) 0% 50%) 0 0/20px 20px;
}
#crop-canvas{position:absolute;touch-action:none}
.crop-hint{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  font-size:12px;color:var(--dim);font-family:var(--mono);
  background:var(--bg);padding:6px 14px;border-radius:20px;border:1px solid var(--s3);
}
.crop-hint.auto{color:var(--accent);border-color:var(--accent-md)}

#screen-result{display:none;flex-direction:column;height:100%;background:var(--bg)}
.res-header{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;background:var(--s1);border-bottom:1px solid var(--s2);flex-shrink:0}
.res-title{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:1.5px}
.res-preview{
  flex:1;overflow:auto;display:flex;align-items:center;justify-content:center;padding:20px;
  background:repeating-conic-gradient(var(--s1) 0% 25%,var(--bg) 0% 50%) 0 0/20px 20px;
}
#result-img{max-width:100%;max-height:100%;border-radius:var(--r);box-shadow:0 8px 40px rgba(0,0,0,.5)}
.res-actions{padding:20px;padding-bottom:36px;display:flex;gap:10px;background:var(--s1);border-top:1px solid var(--s2);flex-shrink:0}
.res-btn{
  flex:1;padding:14px;border-radius:var(--r);font-size:14px;font-weight:600;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;
}
.res-btn:active{transform:scale(.96)}
.res-btn.jpeg{background:var(--s2);color:var(--text);border:1px solid var(--s3)}
.res-btn.pdf{background:var(--s2);color:var(--text);border:1px solid var(--s3)}
.res-btn.share{background:var(--accent);color:var(--bg)}
.res-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.res-new{width:100%;padding:12px;background:transparent;color:var(--dim);font-size:13px;font-weight:500;text-align:center;margin-top:4px}
</style>
</head>
<body>

<div id="toast"></div>
<div id="spinner-overlay"><div class="spinner"></div><div class="spinner-text">Detecting edges…</div></div>

<div id="screen-welcome">
  <div class="w-icon"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18M3 9h18"/><circle cx="15" cy="15" r="2"/></svg></div>
  <h1 class="w-title">Doc<em>Scan</em></h1>
  <p class="w-sub">Photograph a document, auto-detect edges, straighten to perfect corners, export as JPEG or PDF.</p>
  <button class="btn-main" onclick="startCamera()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>Open Camera</button>
  <button class="btn-ghost" onclick="pickFile()">Upload Image</button>
  <input type="file" id="file-input" accept="image/*" class="hide">
</div>

<div id="screen-camera">
  <video id="video" autoplay playsinline muted></video>
  <div class="cam-overlay">
    <div class="cam-top">
      <button class="cam-btn" onclick="closeCamera()"><svg viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      <button class="cam-btn" id="btn-flash" onclick="toggleFlash()"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></button>
    </div>
    <div class="cam-guide"><span class="cam-label">Align document</span></div>
    <div class="cam-bottom">
      <button class="cam-btn" onclick="switchCam()"><svg viewBox="0 0 24 24"><path d="M20 5h-3.59l-1.7-1.71A1 1 0 0014 3h-4a1 1 0 00-.71.29L7.59 5H4a2 2 0 00-2 2v11a2 2 0 002 2h16a2 2 0 002-2V7a2 2 0 00-2-2z"/><circle cx="12" cy="12.5" r="2.5"/><path d="M9 1L7 3l2 2M15 1l2 2-2 2"/></svg></button>
      <button class="shutter" onclick="capture()"><div class="shutter-inner"></div></button>
      <button class="cam-btn" onclick="pickFile()"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
    </div>
  </div>
  <canvas id="snap-canvas" class="hide"></canvas>
</div>

<div id="screen-crop">
  <div class="crop-header">
    <button class="crop-btn back" onclick="backFromCrop()">← Back</button>
    <span class="crop-title">Adjust Corners</span>
    <button class="crop-btn done" onclick="applyTransform()">Scan ✓</button>
  </div>
  <div class="crop-canvas-wrap" id="crop-wrap">
    <canvas id="crop-canvas"></canvas>
    <div class="crop-hint" id="crop-hint">Drag corners to adjust</div>
  </div>
</div>

<div id="screen-result">
  <div class="res-header">
    <button class="crop-btn back" onclick="backFromResult()">← Back</button>
    <span class="res-title">Scanned</span>
    <div style="width:70px"></div>
  </div>
  <div class="res-preview"><img id="result-img"></div>
  <div class="res-actions">
    <button class="res-btn jpeg" onclick="saveJPEG()"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>JPEG</button>
    <button class="res-btn pdf" onclick="savePDF()"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>PDF</button>
    <button class="res-btn share" onclick="shareResult()"><svg viewBox="0 0 24 24"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>Share</button>
  </div>
  <button class="res-new" onclick="goHome()">Scan another document</button>
</div>

<script>
let stream=null,facingMode='environment',flashOn=false;
let corners=[],activeCorner=-1;
let cropImg=new Image(),cropScale=1,cropOx=0,cropOy=0;
let resultDataURL='',autoDetected=false;

function showScreen(id){
  ['screen-welcome','screen-camera','screen-crop','screen-result'].forEach(s=>document.getElementById(s).style.display='none');
  document.getElementById(id).style.display='flex';
}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}
function showSpinner(m){const o=document.getElementById('spinner-overlay');o.querySelector('.spinner-text').textContent=m||'Processing…';o.classList.add('show')}
function hideSpinner(){document.getElementById('spinner-overlay').classList.remove('show')}

// ── CAMERA ──
async function startCamera(){
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode,width:{ideal:1920},height:{ideal:1080}},audio:false});
    document.getElementById('video').srcObject=stream;showScreen('screen-camera');
  }catch(e){toast('Camera access denied')}
}
function closeCamera(){stopStream();showScreen('screen-welcome')}
function stopStream(){if(stream){stream.getTracks().forEach(t=>t.stop());stream=null}}
function switchCam(){facingMode=facingMode==='environment'?'user':'environment';stopStream();startCamera()}
function toggleFlash(){
  if(!stream)return;const tr=stream.getVideoTracks()[0],caps=tr.getCapabilities?tr.getCapabilities():{};
  if(caps.torch){flashOn=!flashOn;tr.applyConstraints({advanced:[{torch:flashOn}]});document.getElementById('btn-flash').style.color=flashOn?'var(--accent)':'#fff'}
  else toast('Flash not available');
}
function capture(){
  const v=document.getElementById('video'),c=document.getElementById('snap-canvas');
  c.width=v.videoWidth;c.height=v.videoHeight;c.getContext('2d').drawImage(v,0,0);
  stopStream();loadImageForCrop(c.toDataURL('image/jpeg',0.95));
}
function pickFile(){document.getElementById('file-input').click()}
document.getElementById('file-input').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();r.onload=ev=>{stopStream();loadImageForCrop(ev.target.result)};
  r.readAsDataURL(f);e.target.value='';
});

// ══════════════════════════════════════════
// AUTO EDGE DETECTION (pure JS) v2
// Strategy: brightness threshold to find paper
// → morphological close → boundary trace
// → convex hull → approx quad
// Also: Canny-style edge + Hough lines fallback
// ══════════════════════════════════════════

function toGray(imgData){
  const d=imgData.data,n=imgData.width*imgData.height,g=new Float32Array(n);
  for(let i=0;i<n;i++){const j=i*4;g[i]=.299*d[j]+.587*d[j+1]+.114*d[j+2]}return g;
}

function gBlur(g,w,h){
  const k=[1,4,6,4,1, 4,16,24,16,4, 6,24,36,24,6, 4,16,24,16,4, 1,4,6,4,1];
  const o=new Float32Array(w*h);
  for(let y=2;y<h-2;y++)for(let x=2;x<w-2;x++){
    let s=0,ki=0;
    for(let ky=-2;ky<=2;ky++)for(let kx=-2;kx<=2;kx++) s+=g[(y+ky)*w+(x+kx)]*k[ki++];
    o[y*w+x]=s/256;
  }
  return o;
}

function sobel(g,w,h){
  const mx=new Float32Array(w*h),my=new Float32Array(w*h),mag=new Float32Array(w*h);
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    const gx=-g[(y-1)*w+x-1]-2*g[y*w+x-1]-g[(y+1)*w+x-1]+g[(y-1)*w+x+1]+2*g[y*w+x+1]+g[(y+1)*w+x+1];
    const gy=-g[(y-1)*w+x-1]-2*g[(y-1)*w+x]-g[(y-1)*w+x+1]+g[(y+1)*w+x-1]+2*g[(y+1)*w+x]+g[(y+1)*w+x+1];
    mx[y*w+x]=gx; my[y*w+x]=gy; mag[y*w+x]=Math.sqrt(gx*gx+gy*gy);
  }
  return {mag,mx,my};
}

// Paper mask: uses BOTH brightness AND low saturation
// Paper is bright + achromatic (low saturation). Desk wood is bright but saturated (warm tones).
function paperMask(imgData){
  const d=imgData.data, w=imgData.width, h=imgData.height;
  const mask=new Uint8Array(w*h);

  // First pass: compute brightness stats to set adaptive threshold
  let bSum=0;
  const brArr=new Float32Array(w*h);
  for(let i=0;i<w*h;i++){
    const j=i*4;
    const r=d[j],g=d[j+1],b=d[j+2];
    const br=0.299*r+0.587*g+0.114*b;
    brArr[i]=br; bSum+=br;
  }
  const bMean=bSum/(w*h);

  // Sort brightness to find top percentile
  const sorted=[...brArr].sort((a,b)=>a-b);
  const p75=sorted[Math.floor(sorted.length*0.75)];
  const p95=sorted[Math.floor(sorted.length*0.95)];

  // Paper threshold: must be in the brighter portion of the image
  const brightThresh=Math.max(p75, bMean*1.05, 120);

  // Second pass: classify pixels
  for(let i=0;i<w*h;i++){
    const j=i*4;
    const r=d[j],g=d[j+1],b=d[j+2];
    const br=brArr[i];

    // Saturation: how "colorful" is this pixel?
    const maxC=Math.max(r,g,b), minC=Math.min(r,g,b);
    const sat=maxC>0?(maxC-minC)/maxC:0;

    // Paper = bright AND low saturation (white/light gray)
    // sat < 0.25 filters out wooden desk, colored objects
    // Also allow very bright pixels even with slightly higher sat (glare/highlights on paper)
    if(br>=brightThresh && (sat<0.25 || br>p95)){
      mask[i]=255;
    }
  }
  return {mask, w, h};
}

// Morphological operations
function erode(b,w,h,r){
  const o=new Uint8Array(w*h);
  for(let y=r;y<h-r;y++)for(let x=r;x<w-r;x++){
    let all=true;
    for(let dy=-r;dy<=r&&all;dy++)for(let dx=-r;dx<=r&&all;dx++) if(!b[(y+dy)*w+(x+dx)]) all=false;
    if(all) o[y*w+x]=255;
  }
  return o;
}
function dilate(b,w,h,r){
  const o=new Uint8Array(w*h);
  for(let y=r;y<h-r;y++)for(let x=r;x<w-r;x++){
    let f=false;
    for(let dy=-r;dy<=r&&!f;dy++)for(let dx=-r;dx<=r&&!f;dx++) if(b[(y+dy)*w+(x+dx)]) f=true;
    if(f) o[y*w+x]=255;
  }
  return o;
}
function morphClose(b,w,h,r){ return erode(dilate(b,w,h,r),w,h,r); }
function morphOpen(b,w,h,r){ return dilate(erode(b,w,h,r),w,h,r); }

// Boundary trace — find pixels on the edge of a binary mask
function traceBoundary(mask,w,h){
  const pts=[];
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    if(!mask[y*w+x]) continue;
    // Check if any 4-neighbor is background
    if(!mask[(y-1)*w+x]||!mask[(y+1)*w+x]||!mask[y*w+x-1]||!mask[y*w+x+1])
      pts.push({x,y});
  }
  return pts;
}

// Convex hull (Andrew's monotone chain)
function convexHull(points){
  const pts=[...points].sort((a,b)=>a.x-b.x||a.y-b.y);
  if(pts.length<3) return pts;
  const cross=(O,A,B)=>(A.x-O.x)*(B.y-O.y)-(A.y-O.y)*(B.x-O.x);
  const lo=[];
  for(const p of pts){while(lo.length>=2&&cross(lo[lo.length-2],lo[lo.length-1],p)<=0)lo.pop();lo.push(p)}
  const up=[];
  for(let i=pts.length-1;i>=0;i--){const p=pts[i];while(up.length>=2&&cross(up[up.length-2],up[up.length-1],p)<=0)up.pop();up.push(p)}
  lo.pop();up.pop();
  return lo.concat(up);
}

// Ramer-Douglas-Peucker
function approxPoly(pts,eps){
  if(pts.length<3) return pts;
  let mx=0,idx=0;const f=pts[0],l=pts[pts.length-1];
  for(let i=1;i<pts.length-1;i++){const d=ptLineDist(pts[i],f,l);if(d>mx){mx=d;idx=i}}
  if(mx>eps){const r1=approxPoly(pts.slice(0,idx+1),eps),r2=approxPoly(pts.slice(idx),eps);return r1.slice(0,-1).concat(r2)}
  return[f,l];
}
function ptLineDist(p,a,b){
  const dx=b.x-a.x,dy=b.y-a.y,len=Math.sqrt(dx*dx+dy*dy);
  if(!len) return Math.hypot(p.x-a.x,p.y-a.y);
  return Math.abs(dx*(a.y-p.y)-dy*(a.x-p.x))/len;
}

function orderCorners(pts){
  // Centroid
  let cx=0,cy=0;pts.forEach(p=>{cx+=p.x;cy+=p.y});cx/=4;cy/=4;
  // Sort by angle from centroid
  const angled=pts.map(p=>({...p,ang:Math.atan2(p.y-cy,p.x-cx)}));
  angled.sort((a,b)=>a.ang-b.ang);
  // Now sorted CCW; find TL (smallest x+y)
  let minSum=Infinity,minIdx=0;
  angled.forEach((p,i)=>{const s=p.x+p.y;if(s<minSum){minSum=s;minIdx=i}});
  // Rotate so TL is first
  const rotated=[...angled.slice(minIdx),...angled.slice(0,minIdx)];
  // TL, BL, BR, TR (CCW) → we want TL, TR, BR, BL
  return [rotated[0],rotated[3],rotated[2],rotated[1]];
}

function quadArea(p){let a=0;for(let i=0;i<4;i++){const j=(i+1)%4;a+=p[i].x*p[j].y-p[j].x*p[i].y}return Math.abs(a)/2}

function angBtw(a,b,c){
  const v1={x:a.x-b.x,y:a.y-b.y},v2={x:c.x-b.x,y:c.y-b.y};
  const dot=v1.x*v2.x+v1.y*v2.y,m1=Math.hypot(v1.x,v1.y),m2=Math.hypot(v2.x,v2.y);
  if(!m1||!m2) return 0;
  return Math.acos(Math.max(-1,Math.min(1,dot/(m1*m2))))*180/Math.PI;
}

function isGoodQuad(p,iw,ih){
  const a=quadArea(p),ia=iw*ih;
  // Must be between 8% and 90% of image area (reject full-frame grabs)
  if(a<ia*.08 || a>ia*.90) return false;
  // All corners must be inset from edges by at least 2%
  const m=Math.min(iw,ih)*0.02;
  for(const pt of p){
    if(pt.x<m||pt.y<m||pt.x>iw-m||pt.y>ih-m) return false;
  }
  // Angles should be roughly quadrilateral (50-130 degrees)
  for(let i=0;i<4;i++){
    const ang=angBtw(p[i],p[(i+1)%4],p[(i+2)%4]);
    if(ang<50||ang>130) return false;
  }
  return true;
}

function hullPerim(p){
  let s=0;for(let i=0;i<p.length;i++){const j=(i+1)%p.length;s+=Math.hypot(p[j].x-p[i].x,p[j].y-p[i].y)}return s;
}

// ── Method 1: Paper detection (brightness + low saturation) ──
function detectByBrightness(imgData,w,h){
  const {mask}=paperMask(imgData);
  // Clean up noise: open then close
  let cleaned=morphOpen(mask,w,h,3);
  cleaned=morphClose(cleaned,w,h,5);

  // Find the largest connected paper region
  const vis=new Uint8Array(w*h);
  let bestPts=null, bestSize=0;
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    if(!cleaned[y*w+x]||vis[y*w+x]) continue;
    const region=[];const q=[[x,y]];vis[y*w+x]=1;
    while(q.length>0&&region.length<100000){
      const[cx,cy]=q.shift();region.push({x:cx,y:cy});
      for(const[dx,dy] of [[-1,0],[1,0],[0,-1],[0,1]]){
        const nx=cx+dx,ny=cy+dy;
        if(nx>=0&&nx<w&&ny>=0&&ny<h&&cleaned[ny*w+nx]&&!vis[ny*w+nx]){
          vis[ny*w+nx]=1;q.push([nx,ny]);
        }
      }
    }
    if(region.length>bestSize){bestSize=region.length;bestPts=region}
  }

  if(!bestPts||bestPts.length<100) return null;

  const regionMask=new Uint8Array(w*h);
  for(const p of bestPts) regionMask[p.y*w+p.x]=255;
  const boundary=traceBoundary(regionMask,w,h);
  if(boundary.length<20) return null;

  const hull=convexHull(boundary);
  if(hull.length<4) return null;
  const per=hullPerim(hull);

  for(let ep=0.015;ep<=0.12;ep+=0.005){
    const ap=approxPoly(hull,ep*per);
    if(ap.length===4){
      const ord=orderCorners(ap);
      if(isGoodQuad(ord,w,h)) return ord;
    }
  }
  return null;
}

// ── Method 2: Edge-based with Hough lines ──
function detectByEdges(gray,w,h){
  const bl=gBlur(gray,w,h);
  const {mag}=sobel(bl,w,h);

  // Strong edge threshold
  const vals=[];for(let i=0;i<w*h;i++) if(mag[i]>0) vals.push(mag[i]);
  vals.sort((a,b)=>a-b);
  const t=vals[Math.floor(vals.length*0.85)]||30;
  const bin=new Uint8Array(w*h);
  for(let i=0;i<w*h;i++) bin[i]=mag[i]>=t?255:0;

  const dil=dilate(bin,w,h,1);
  const boundary=[];
  for(let y=1;y<h-1;y++)for(let x=1;x<w-1;x++){
    if(dil[y*w+x]) boundary.push({x,y});
  }
  if(boundary.length<50) return null;

  const hull=convexHull(boundary);
  if(hull.length<4) return null;
  const per=hullPerim(hull);

  for(let ep=0.015;ep<=0.12;ep+=0.005){
    const ap=approxPoly(hull,ep*per);
    if(ap.length===4){
      const ord=orderCorners(ap);
      if(isGoodQuad(ord,w,h)) return ord;
    }
  }
  return null;
}

// ── Main detection: try paper detection first, then edges ──
function detectCorners(img){
  const MAX=500,sc=Math.min(1,MAX/Math.max(img.width,img.height));
  const w=Math.round(img.width*sc),h=Math.round(img.height*sc);
  const tc=document.createElement('canvas');tc.width=w;tc.height=h;
  tc.getContext('2d').drawImage(img,0,0,w,h);
  const id=tc.getContext('2d').getImageData(0,0,w,h);
  const gray=toGray(id);

  // Try color-aware paper detection first (best for paper on desk/table)
  let result=detectByBrightness(id,w,h);
  if(result) return result.map(p=>({x:p.x/sc,y:p.y/sc}));

  // Fallback: edge-based detection
  result=detectByEdges(gray,w,h);
  if(result) return result.map(p=>({x:p.x/sc,y:p.y/sc}));

  return null;
}

// ── CROP SCREEN ──
function loadImageForCrop(du){
  showSpinner('Detecting edges…');
  cropImg=new Image();
  cropImg.onload=()=>{
    const det=detectCorners(cropImg);
    if(det){corners=det;autoDetected=true}
    else{const m=.1;corners=[{x:cropImg.width*m,y:cropImg.height*m},{x:cropImg.width*(1-m),y:cropImg.height*m},{x:cropImg.width*(1-m),y:cropImg.height*(1-m)},{x:cropImg.width*m,y:cropImg.height*(1-m)}];autoDetected=false}
    hideSpinner();showScreen('screen-crop');
    // Wait for layout to compute before measuring canvas wrapper
    requestAnimationFrame(()=>{requestAnimationFrame(()=>{
      initCropCanvas();
      const hint=document.getElementById('crop-hint');
      if(autoDetected){hint.textContent='✓ Document detected — adjust if needed';hint.classList.add('auto')}
      else{hint.textContent='Drag corners to fit your document';hint.classList.remove('auto')}
    })});
  };cropImg.src=du;
}
function initCropCanvas(){
  const wrap=document.getElementById('crop-wrap'),canvas=document.getElementById('crop-canvas');
  const W=wrap.clientWidth,H=wrap.clientHeight,dpr=window.devicePixelRatio||1;
  cropScale=Math.min(W/cropImg.width,H/cropImg.height)*.9;
  cropOx=(W-cropImg.width*cropScale)/2;cropOy=(H-cropImg.height*cropScale)/2;
  canvas.width=W*dpr;canvas.height=H*dpr;canvas.style.width=W+'px';canvas.style.height=H+'px';
  drawCrop();setupTouch(canvas,dpr);
}
function drawCrop(){
  const canvas=document.getElementById('crop-canvas'),dpr=window.devicePixelRatio||1,ctx=canvas.getContext('2d');
  const w=canvas.width/dpr,h=canvas.height/dpr;ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,w,h);
  ctx.drawImage(cropImg,cropOx,cropOy,cropImg.width*cropScale,cropImg.height*cropScale);
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(0,0,w,h);
  const pts=corners.map(p=>({x:p.x*cropScale+cropOx,y:p.y*cropScale+cropOy}));
  ctx.save();ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<4;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.closePath();ctx.clip();
  ctx.drawImage(cropImg,cropOx,cropOy,cropImg.width*cropScale,cropImg.height*cropScale);ctx.restore();
  ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<4;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.closePath();ctx.strokeStyle='#00dfa2';ctx.lineWidth=2;ctx.stroke();
  for(let i=0;i<4;i++){const a=pts[i],b=pts[(i+1)%4];ctx.fillStyle='rgba(0,223,162,0.15)';ctx.beginPath();ctx.arc((a.x+b.x)/2,(a.y+b.y)/2,6,0,Math.PI*2);ctx.fill()}
  for(let i=0;i<4;i++){const p=pts[i];ctx.fillStyle='rgba(0,223,162,0.2)';ctx.beginPath();ctx.arc(p.x,p.y,22,0,Math.PI*2);ctx.fill();ctx.fillStyle='#00dfa2';ctx.beginPath();ctx.arc(p.x,p.y,10,0,Math.PI*2);ctx.fill();ctx.fillStyle='#0b0b10';ctx.beginPath();ctx.arc(p.x,p.y,4,0,Math.PI*2);ctx.fill()}
  const lb=['TL','TR','BR','BL'];ctx.font='600 10px "JetBrains Mono"';ctx.fillStyle='rgba(0,223,162,0.5)';ctx.textAlign='center';
  for(let i=0;i<4;i++)ctx.fillText(lb[i],pts[i].x,pts[i].y-18);
}
function setupTouch(canvas){
  canvas.onpointerdown=e=>{e.preventDefault();const r=canvas.getBoundingClientRect(),cx=e.clientX-r.left,cy=e.clientY-r.top;let md=Infinity;activeCorner=-1;
    corners.forEach((c,i)=>{const sx=c.x*cropScale+cropOx,sy=c.y*cropScale+cropOy,d=Math.hypot(cx-sx,cy-sy);if(d<45&&d<md){md=d;activeCorner=i}});
    if(activeCorner>=0)canvas.setPointerCapture(e.pointerId)};
  canvas.onpointermove=e=>{if(activeCorner<0)return;e.preventDefault();const r=canvas.getBoundingClientRect();
    let ix=(e.clientX-r.left-cropOx)/cropScale,iy=(e.clientY-r.top-cropOy)/cropScale;
    corners[activeCorner]={x:Math.max(0,Math.min(cropImg.width,ix)),y:Math.max(0,Math.min(cropImg.height,iy))};drawCrop()};
  canvas.onpointerup=()=>{activeCorner=-1};
}
function backFromCrop(){showScreen('screen-welcome')}

// ── PERSPECTIVE TRANSFORM ──
function applyTransform(){showSpinner('Flattening document…');requestAnimationFrame(()=>setTimeout(doTransform,50))}
function doTransform(){
  const src=corners,dist=(a,b)=>Math.hypot(b.x-a.x,b.y-a.y);
  const W=Math.round(Math.max(dist(src[0],src[1]),dist(src[3],src[2]))),H=Math.round(Math.max(dist(src[0],src[3]),dist(src[1],src[2])));
  const dst=[{x:0,y:0},{x:W,y:0},{x:W,y:H},{x:0,y:H}],Hm=compH(src,dst);
  if(!Hm){hideSpinner();toast('Transform failed');return}
  const sc=document.createElement('canvas');sc.width=cropImg.width;sc.height=cropImg.height;sc.getContext('2d').drawImage(cropImg,0,0);
  const sd=sc.getContext('2d').getImageData(0,0,sc.width,sc.height);
  const dc=document.createElement('canvas');dc.width=W;dc.height=H;const dctx=dc.getContext('2d'),dd=dctx.createImageData(W,H);
  const Hi=inv3(Hm);if(!Hi){hideSpinner();toast('Transform failed');return}
  const s=sd.data,d=dd.data,sw=sc.width,sh=sc.height;
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const dv=Hi[6]*x+Hi[7]*y+Hi[8],sx=(Hi[0]*x+Hi[1]*y+Hi[2])/dv,sy=(Hi[3]*x+Hi[4]*y+Hi[5])/dv;
    if(sx>=0&&sx<sw-1&&sy>=0&&sy<sh-1){const x0=Math.floor(sx),y0=Math.floor(sy),fx=sx-x0,fy=sy-y0,
      i00=(y0*sw+x0)*4,i10=i00+4,i01=i00+sw*4,i11=i01+4,w00=(1-fx)*(1-fy),w10=fx*(1-fy),w01=(1-fx)*fy,w11=fx*fy,di=(y*W+x)*4;
      d[di]=s[i00]*w00+s[i10]*w10+s[i01]*w01+s[i11]*w11;d[di+1]=s[i00+1]*w00+s[i10+1]*w10+s[i01+1]*w01+s[i11+1]*w11;
      d[di+2]=s[i00+2]*w00+s[i10+2]*w10+s[i01+2]*w01+s[i11+2]*w11;d[di+3]=255}}
  dctx.putImageData(dd,0,0);resultDataURL=dc.toDataURL('image/jpeg',.92);
  document.getElementById('result-img').src=resultDataURL;hideSpinner();showScreen('screen-result');
}
function compH(src,dst){
  const A=[],b=[];for(let i=0;i<4;i++){const sx=src[i].x,sy=src[i].y,dx=dst[i].x,dy=dst[i].y;
    A.push([sx,sy,1,0,0,0,-dx*sx,-dx*sy]);b.push(dx);A.push([0,0,0,sx,sy,1,-dy*sx,-dy*sy]);b.push(dy)}
  const n=8,M=A.map((r,i)=>[...r,b[i]]);
  for(let c=0;c<n;c++){let mr=c,mv=Math.abs(M[c][c]);for(let r=c+1;r<n;r++)if(Math.abs(M[r][c])>mv){mv=Math.abs(M[r][c]);mr=r}
    [M[c],M[mr]]=[M[mr],M[c]];if(Math.abs(M[c][c])<1e-10)return null;const p=M[c][c];for(let j=c;j<=n;j++)M[c][j]/=p;
    for(let r=0;r<n;r++){if(r===c)continue;const f=M[r][c];for(let j=c;j<=n;j++)M[r][j]-=f*M[c][j]}}
  const h=M.map(r=>r[n]);return[h[0],h[1],h[2],h[3],h[4],h[5],h[6],h[7],1];
}
function inv3(m){const[a,b,c,d,e,f,g,h,i]=m,det=a*(e*i-f*h)-b*(d*i-f*g)+c*(d*h-e*g);if(Math.abs(det)<1e-10)return null;const id=1/det;
  return[(e*i-f*h)*id,(c*h-b*i)*id,(b*f-c*e)*id,(f*g-d*i)*id,(a*i-c*g)*id,(c*d-a*f)*id,(d*h-e*g)*id,(b*g-a*h)*id,(a*e-b*d)*id]}

// ── EXPORT ──
function saveJPEG(){dl(resultDataURL,'DocScan_'+ts()+'.jpg');toast('JPEG saved')}
function savePDF(){
  const img=document.getElementById('result-img'),c=document.createElement('canvas');c.width=img.naturalWidth;c.height=img.naturalHeight;c.getContext('2d').drawImage(img,0,0);
  const jdu=c.toDataURL('image/jpeg',.92),jb64=jdu.split(',')[1],jb=atob(jb64),jl=jb.length;
  const pw=595.28,ph=841.89,ia=c.width/c.height,pa=pw/ph;let iw,ih;
  if(ia>pa){iw=pw;ih=pw/ia}else{ih=ph;iw=ph*ia}const ix=(pw-iw)/2,iy=(ph-ih)/2;
  const off=[];let pdf='%PDF-1.4\n';
  off.push(pdf.length);pdf+='1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n';
  off.push(pdf.length);pdf+='2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n';
  off.push(pdf.length);pdf+=`3 0 obj\n<< /Type /Page /Parent 2 0 R /MediaBox [0 0 ${pw} ${ph}] /Contents 4 0 R /Resources << /XObject << /Img 5 0 R >> >> >>\nendobj\n`;
  const stm=`q\n${iw.toFixed(2)} 0 0 ${ih.toFixed(2)} ${ix.toFixed(2)} ${iy.toFixed(2)} cm\n/Img Do\nQ\n`;
  off.push(pdf.length);pdf+=`4 0 obj\n<< /Length ${stm.length} >>\nstream\n${stm}endstream\nendobj\n`;
  off.push(pdf.length);
  const ioh=`5 0 obj\n<< /Type /XObject /Subtype /Image /Width ${c.width} /Height ${c.height} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jl} >>\nstream\n`;
  const iof=`\nendstream\nendobj\n`;const enc=new TextEncoder(),pb=enc.encode(pdf+ioh),pa2=enc.encode(iof);
  const xo=pb.length+jl+pa2.length;let xr=`xref\n0 6\n0000000000 65535 f \n`;
  for(let i=0;i<off.length;i++)xr+=String(off[i]).padStart(10,'0')+' 00000 n \n';
  xr+=`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xo}\n%%EOF`;const xrb=enc.encode(xr);
  const tot=pb.length+jl+pa2.length+xrb.length,arr=new Uint8Array(tot);arr.set(pb,0);
  for(let i=0;i<jl;i++)arr[pb.length+i]=jb.charCodeAt(i);arr.set(pa2,pb.length+jl);arr.set(xrb,pb.length+jl+pa2.length);
  const blob=new Blob([arr],{type:'application/pdf'}),url=URL.createObjectURL(blob),a=document.createElement('a');
  a.href=url;a.download='DocScan_'+ts()+'.pdf';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);toast('PDF saved');
}
async function shareResult(){
  if(!navigator.share){toast('Share not supported — saving instead');saveJPEG();return}
  try{const blob=await(await fetch(resultDataURL)).blob();const file=new File([blob],'DocScan_'+ts()+'.jpg',{type:'image/jpeg'});
    await navigator.share({files:[file],title:'Scanned Document'})}catch(e){if(e.name!=='AbortError')toast('Share cancelled')}
}
function dl(du,fn){const a=document.createElement('a');a.href=du;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a)}
function ts(){const d=new Date();return d.getFullYear()+''+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'_'+String(d.getHours()).padStart(2,'0')+String(d.getMinutes()).padStart(2,'0')}
function backFromResult(){showScreen('screen-crop');requestAnimationFrame(()=>requestAnimationFrame(()=>initCropCanvas()))}
function goHome(){resultDataURL='';showScreen('screen-welcome')}
window.addEventListener('resize',()=>{if(document.getElementById('screen-crop').style.display==='flex')requestAnimationFrame(()=>initCropCanvas())});
</script>
